
syntax = "proto3";
package gz.custom_msgs;

import "gz/msgs/header.proto";
import "gz/msgs/time.proto";

message RFIDScanResponse
{
	gz.msgs.Header header = 1;

	gz.msgs.Time time = 2;

	message ScanResponse {
		string uid = 1;
		string data = 2;
		double rssi = 3;
	}

	repeated ScanResponse scan = 3;
}
